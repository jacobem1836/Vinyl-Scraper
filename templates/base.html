<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}CRATE{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-brand">CRATE</a>
      <button
        id="openAddItemBtn"
        type="button"
        class="btn-cta"
      >
        Add Item
      </button>
    </div>
  </nav>

  <main class="container" style="padding-top: var(--space-lg); padding-bottom: var(--space-lg);">
    {% block content %}{% endblock %}
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const modal = document.getElementById('addItemModal');
      const openBtn = document.getElementById('openAddItemBtn');
      const closeBtns = document.querySelectorAll('[data-close-modal]');

      const openModal = () => {
        if (!modal) return;
        modal.classList.remove('hidden');
        requestAnimationFrame(() => {
          modal.dataset.open = 'true';
          const backdrop = modal.querySelector('[data-backdrop]');
          const panel = modal.querySelector('[data-panel]');
          if (backdrop) backdrop.classList.remove('opacity-0');
          if (panel) panel.classList.remove('opacity-0', 'translate-y-4');
          const firstFocusable = modal.querySelector('input, select, textarea, button');
          if (firstFocusable) firstFocusable.focus();
        });
      };

      const closeModal = () => {
        if (!modal) return;
        modal.dataset.open = 'false';
        const backdrop = modal.querySelector('[data-backdrop]');
        const panel = modal.querySelector('[data-panel]');
        if (backdrop) backdrop.classList.add('opacity-0');
        if (panel) panel.classList.add('opacity-0', 'translate-y-4');
        setTimeout(() => modal.classList.add('hidden'), 200);
        if (openBtn) openBtn.focus();
      };

      if (openBtn) {
        openBtn.addEventListener('click', () => {
          if (modal) openModal();
        });
      }

      closeBtns.forEach(btn => btn.addEventListener('click', closeModal));

      if (modal) {
        modal.addEventListener('click', (e) => {
          if (e.target.matches('[data-backdrop]')) closeModal();
        });
      }

      const relativeTime = (iso) => {
        const dt = new Date(iso);
        if (Number.isNaN(dt.getTime())) return 'never';
        const now = new Date();
        const diffSec = Math.max(0, Math.floor((now - dt) / 1000));
        if (diffSec < 60) return 'just now';
        const mins = Math.floor(diffSec / 60);
        if (mins < 60) return `${mins} minute${mins === 1 ? '' : 's'} ago`;
        const hours = Math.floor(mins / 60);
        if (hours < 24) return `${hours} hour${hours === 1 ? '' : 's'} ago`;
        const days = Math.floor(hours / 24);
        return `${days} day${days === 1 ? '' : 's'} ago`;
      };

      document.querySelectorAll('[data-timestamp]').forEach(el => {
        const value = el.getAttribute('data-timestamp');
        if (!value) {
          el.textContent = 'never';
          return;
        }
        el.textContent = relativeTime(value);
      });
    });
  </script>

  <!-- Toast notification -->
  <div id="toast" class="hidden toast">
    <svg class="shrink-0 text-accent" style="width:20px;height:20px;color:var(--color-accent)" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
    <span id="toastMessage" class="text-sm"></span>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Show toast from ?toast= query param
      const params = new URLSearchParams(window.location.search);
      const toastMsg = params.get('toast');
      if (toastMsg) {
        const toast = document.getElementById('toast');
        const msg = document.getElementById('toastMessage');
        if (toast && msg) {
          msg.textContent = decodeURIComponent(toastMsg.replace(/\+/g, ' '));
          toast.classList.remove('hidden');
          setTimeout(() => toast.classList.add('hidden'), 4000);
          window.history.replaceState({}, '', window.location.pathname);
        }
      }
    });
  </script>

  <!-- Floating scan status panel -->
  <div id="scanPanel" class="hidden scan-panel">
    <div id="scanPill"
         class="scan-pill"
         onclick="toggleScanPanel()">
      <div id="scanSpinner" class="spinner"></div>
      <span id="scanPillText" class="text-sm">Scanning…</span>
    </div>
    <div id="scanCard"
         class="hidden scan-card">
      <div class="flex items-center justify-between" style="margin-bottom:var(--space-sm)">
        <span class="text-sm" style="font-weight:600">Scan Progress</span>
        <button onclick="toggleScanPanel()" class="text-sm text-muted" style="cursor:pointer">collapse</button>
      </div>
      <div id="scanActive" class="stack-sm"></div>
      <div id="scanLog" class="stack-sm" style="max-height:192px;overflow-y:auto"></div>
      <div id="scanSummary" class="hidden text-sm text-success" style="font-weight:600"></div>
    </div>
  </div>

  <script src="/static/typeahead.js"></script>

  <script>
  window.VINYL_API_KEY = '';
  (function () {
    var _pollTimer = null;
    var _dismissTimer = null;
    var _expanded = false;

    function startScan(itemId) {
      var url = (itemId != null) ? '/api/scan/start?item_id=' + itemId : '/api/scan/start';
      fetch(url, { method: 'POST', headers: { 'X-API-Key': window.VINYL_API_KEY || '' } })
        .then(function(r) { return r.json(); })
        .then(function(data) { if (data.started) { showPanel(); startPolling(); } })
        .catch(console.error);
    }

    function showPanel() {
      document.getElementById('scanPanel').classList.remove('hidden');
      clearTimeout(_dismissTimer);
    }

    function hidePanel() {
      document.getElementById('scanPanel').classList.add('hidden');
      document.getElementById('scanCard').classList.add('hidden');
      _expanded = false;
    }

    function toggleScanPanel() {
      _expanded = !_expanded;
      document.getElementById('scanCard').classList.toggle('hidden', !_expanded);
    }

    function startPolling() {
      if (_pollTimer) return;
      _pollTimer = setInterval(pollStatus, 2000);
      pollStatus();
    }

    function stopPolling() {
      clearInterval(_pollTimer);
      _pollTimer = null;
    }

    function pollStatus() {
      fetch('/api/scan/status')
        .then(function(r) { return r.json(); })
        .then(renderStatus)
        .catch(console.error);
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderStatus(s) {
      if (!s.is_running && !s.started_at) { hidePanel(); stopPolling(); return; }
      showPanel();
      var pillText = document.getElementById('scanPillText');
      var spinner = document.getElementById('scanSpinner');
      var activeEl = document.getElementById('scanActive');
      var logEl = document.getElementById('scanLog');
      var summaryEl = document.getElementById('scanSummary');

      if (s.is_running) {
        spinner.classList.remove('hidden');
        pillText.textContent = 'Scanning ' + s.done + '/' + s.total + '…';
        activeEl.innerHTML = s.current.map(function(c) {
          return '<div class="text-sm text-muted">⟳ ' + escHtml(c.query) + ' <span class="text-faint">(' + escHtml(c.type) + ')</span></div>';
        }).join('');
      } else {
        spinner.classList.add('hidden');
        pillText.textContent = 'Done — ' + s.new_total + ' new listing' + (s.new_total !== 1 ? 's' : '');
        activeEl.innerHTML = '';
        summaryEl.textContent = s.new_total + ' new listing' + (s.new_total !== 1 ? 's' : '') + ' found';
        summaryEl.classList.remove('hidden');
        stopPolling();
        _dismissTimer = setTimeout(hidePanel, 10000);
      }

      logEl.innerHTML = s.log.slice().reverse().map(function(entry) {
        return '<div class="text-sm text-muted">' + escHtml(entry.query) + ' — <span class="text-success">+' + entry.new_listings + '</span></div>';
      }).join('');
    }

    document.addEventListener('DOMContentLoaded', function() {
      fetch('/api/scan/status')
        .then(function(r) { return r.json(); })
        .then(function(s) { if (s.is_running) { showPanel(); startPolling(); } else if (s.started_at) { showPanel(); renderStatus(s); } })
        .catch(function(){});
    });

    window.startScan = startScan;
    window.toggleScanPanel = toggleScanPanel;
  })();
  </script>

</body>
</html>
